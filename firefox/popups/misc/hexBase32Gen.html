<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex/Base32 generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e4e4e7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .key-container {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .key-label {
            margin-bottom: 8px;
            font-weight: 600;
            text-align: left;
            display: block;
            color: #ffffff;
            font-size: 13px;
            letter-spacing: -0.01em;
        }

        .key-container input {
            font-size: 14px;
            padding: 10px 45px 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            width: 100%;
            background: rgba(39, 39, 42, 0.6);
            color: #e4e4e7;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .key-container input:focus {
            outline: none;
            background: rgba(55, 55, 60, 0.8);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .copy-icon {
            position: absolute;
            right: 12px;
            top: 72%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .copy-icon:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        .copy-icon img {
            width: 20px;
            height: 20px;
            filter: brightness(0.8);
        }

        .copy-icon:hover img {
            filter: brightness(1.2) drop-shadow(0 2px 8px rgba(99, 102, 241, 0.5));
        }

        .refresh-btn {
            background: rgba(39, 39, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            padding: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .refresh-btn:hover {
            background: rgba(55, 55, 60, 0.8);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn img {
            width: 24px;
            height: 24px;
            display: block;
            filter: brightness(0.8);
            transition: all 0.3s ease;
        }

        .refresh-btn:hover img {
            filter: brightness(1.2) drop-shadow(0 2px 8px rgba(99, 102, 241, 0.5));
            transform: rotate(180deg);
        }

        .footer {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(17, 17, 27, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            color: #71717a;
            margin-top: 14px;
            gap: 12px;
        }

        .footer a {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .footer a:hover {
            color: #a5b4fc;
        }

        .footer #versionText {
            white-space: nowrap;
            flex-shrink: 0;
        }

        #copyBase32Key img {
            filter: invert(1);
        }

        #copyHexKey img {
            filter: invert(1);
        }

        #refreshKeys img {
            filter: invert(1) brightness(0.6);
        }
    </style>
</head>

<body>
    <div class="page-content">
        <h2>Hex/Base32 generator</h2>
        <div class="key-container">
            <label class="key-label">Hex Key:</label>
            <input type="text" id="hexKey" readonly>
            <span class="copy-icon" id="copyHexKey"><img src="/icons/copy.png" alt="Copy"></span>
        </div>
        <div class="key-container">
            <label class="key-label">Base32 Key:</label>
            <input type="text" id="base32Key" readonly>
            <span class="copy-icon" id="copyBase32Key"><img src="/icons/copy.png" alt="Copy"></span>
        </div>
        <button class="refresh-btn" id="refreshKeys">
            <img src="/icons/refresh.png" alt="Refresh">
        </button>
    </div>

    <div class="footer">
        <a href="https://github.com/El3ctr1cR" target="_blank">https://github.com/El3ctr1cR</a>
        <span id="versionText">Version </span>
    </div>

    <script src="hexBase32Gen.js"></script>
</body>

</html>
