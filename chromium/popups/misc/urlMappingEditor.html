<!DOCTYPE html>
<html>

<head>
  <title>Edit URL Mappings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #e4e4e7;
      width: 600px;
      height: 960px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    input[type="text"] {
      width: 100%;
      margin-bottom: 10px;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(39, 39, 42, 0.6);
      color: #e4e4e7;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-weight: 500;
    }

    input[type="text"]:focus {
      outline: none;
      background: rgba(55, 55, 60, 0.8);
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    button {
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: rgba(39, 39, 42, 0.6);
      color: #e4e4e7;
      margin-top: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.2), transparent);
      transition: left 0.5s ease;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      background: rgba(55, 55, 60, 0.8);
      border-color: rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    button:active {
      transform: scale(0.98);
    }

    .mapping-group {
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: rgba(39, 39, 42, 0.4);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mapping-group .inputs-container {
      flex-grow: 1;
      overflow: hidden;
    }

    .remove-mapping-btn,
    .add-mapping-btn {
      width: 20px;
      height: 20px;
      font-size: 20px;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(39, 39, 42, 0.6);
      color: #e4e4e7;
      border-radius: 6px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-top: 0;
    }

    .remove-mapping-btn:hover,
    .add-mapping-btn:hover {
      background: rgba(55, 55, 60, 0.8);
      border-color: rgba(99, 102, 241, 0.4);
      transform: scale(1.05);
    }

    .remove-mapping-btn::before,
    .add-mapping-btn::before {
      display: none;
    }

    #mappingsContainer {
      overflow-y: auto;
      margin-bottom: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(99, 102, 241, 0.5) transparent;
    }

    #mappingsContainer::-webkit-scrollbar {
      width: 6px;
    }

    #mappingsContainer::-webkit-scrollbar-track {
      background: transparent;
    }

    #mappingsContainer::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.4);
      border-radius: 10px;
    }

    #mappingsContainer::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.6);
    }

    #saveMappings {
      align-self: flex-start;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.8) 0%, rgba(22, 163, 74, 0.8) 100%);
      color: white;
      border: 1px solid rgba(34, 197, 94, 0.5);
      border-radius: 8px;
      padding: 10px 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
    }

    #saveMappings:hover {
      background: linear-gradient(135deg, rgba(34, 197, 94, 1) 0%, rgba(22, 163, 74, 1) 100%);
      box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3);
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(17, 17, 27, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
      color: #71717a;
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: #a5b4fc;
    }

    #versionText {
      margin-left: auto;
    }
  </style>
</head>

<body>
  <h2>Edit URL Mappings</h2>
  <p>
    Define which URL should open in incognito and optionally redirect elsewhere.
  </p>

  <div id="mappingsContainer"></div>

  <button id="saveMappings">Save Mappings</button>
  <div class="footer">
    <a href="https://github.com/El3ctr1cR" target="_blank">https://github.com/El3ctr1cR</a>
    <span id="versionText">Version </span>
  </div>
  <script src="urlMappingEditor.js"></script>
</body>

</html>
