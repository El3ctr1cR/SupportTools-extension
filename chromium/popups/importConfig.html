<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Import Configuration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .container {
      flex: 1;
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }
    
    button {
      border: none;
      border-radius: 8px;
      background: rgba(39, 39, 42, 0.6);
      color: #e4e4e7;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.2), transparent);
      transition: left 0.5s ease;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      background: rgba(55, 55, 60, 0.8);
      border-color: rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    button:active {
      transform: scale(0.98);
    }
    
    #firefoxImportConfigButton {
      padding: 10px 20px;
      font-size: 13px;
      margin-top: 10px;
    }
    
    .footer {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(17, 17, 27, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
      color: #71717a;
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: #a5b4fc;
    }
    
    .infoText {
      font-size: 14px;
      margin-bottom: 20px;
      color: #d4d4d8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="infoText">It looks like you're using Firefox. Please import your configuration using the button below.</p>
    <button id="firefoxImportConfigButton">Import Configuration</button>
    <input type="file" id="firefoxImportFileInput" style="display: none;">
  </div>
  
  <div class="footer">
    <a href="https://github.com/El3ctr1cR" target="_blank">https://github.com/El3ctr1cR</a>
    <span id="versionText">Version </span>
  </div>
  
  <script src="importConfig.js"></script>
</body>
</html>
