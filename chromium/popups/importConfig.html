<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Kaseya Tools - Import Config</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    /* ─────────────────────────────────────────────
       CSS VARIABLES – light mode defaults
    ───────────────────────────────────────────── */
    :root {
      --bw-blue:        #175DDC;
      --bw-blue-dark:   #1252A3;
      --bw-blue-hover:  #1a6aed;
      --bw-blue-light:  #e8f0fd;

      --text:           #1f2937;
      --text-sec:       #6b7280;
      --text-muted:     #9ca3af;

      --bg:             #f9fafb;
      --bg-white:       #ffffff;
      --bg-hover:       #f3f4f6;

      --border:         #e5e7eb;
      --border-focus:   #175DDC;

      --input-bg:       #ffffff;
      --input-text:     #1f2937;

      --radius:         6px;
    }

    /* ─────────────────────────────────────────────
       DARK MODE
    ───────────────────────────────────────────── */
    body.dark {
      --bw-blue:        #4d8ef0;
      --bw-blue-dark:   #3a7be0;
      --bw-blue-hover:  #5a9af5;
      --bw-blue-light:  #1e2d45;

      --text:           #e5e7eb;
      --text-sec:       #9ca3af;
      --text-muted:     #6b7280;

      --bg:             #111827;
      --bg-white:       #1f2937;
      --bg-hover:       #2d3748;

      --border:         #374151;
      --border-focus:   #4d8ef0;

      --input-bg:       #1f2937;
      --input-text:     #e5e7eb;
    }

    /* ─────────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-width: 400px;
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
      transition: background 0.2s, color 0.2s;
    }

    /* ─────────────────────────────────────────────
       HEADER
    ───────────────────────────────────────────── */
    .header {
      background: var(--bg-white);
      color: var(--text);
      padding: 0 16px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .header img.header-logo {
      height: 22px;
      width: 22px;
      flex-shrink: 0;
    }

    .header .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    /* ─────────────────────────────────────────────
       CONTENT
    ───────────────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      gap: 16px;
      overflow-y: auto;
      min-width: 0;
    }

    .import-info {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.6;
      text-align: center;
      max-width: 420px;
    }

    /* ─────────────────────────────────────────────
       PRIMARY BUTTONS
    ───────────────────────────────────────────── */
    #importConfigButton {
      all: unset;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    #importConfigButton:hover {
      background: var(--bw-blue-light);
      border-color: var(--bw-blue);
      color: var(--bw-blue);
    }

    #importConfigButton:active {
      transform: scale(0.97);
    }

    #importConfigButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ─────────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 16px;
      background: var(--bg-white);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .footer a { color: var(--bw-blue); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="header">
    <img class="header-logo" src="../icons/icon.png" alt="Icon">
    <span class="header-title">Import Configuration</span>
  </div>

  <div class="content">
    <p class="import-info">Import your configuration from a JSON file. This will overwrite your current settings.</p>
    <button id="importConfigButton">Select JSON File</button>
    <input type="file" id="importFileInput" accept=".json" style="display: none;">
  </div>

  <div class="footer">
    <a href="https://github.com/El3ctr1cR" target="_blank">https://github.com/El3ctr1cR</a>
    <span id="versionText">Version </span>
  </div>

  <script src="importConfig.js"></script>
</body>

</html>
