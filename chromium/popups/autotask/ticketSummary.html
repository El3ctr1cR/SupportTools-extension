<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Summary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e4e4e7;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        .loading {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .summary {
            font-size: 15px;
            text-align: left;
            margin-top: 20px;
            color: #e4e4e7;
            line-height: 1.6;
            display: none;
            max-width: 800px;
            width: 100%;
        }

        .loading-icon {
            border: 12px solid rgba(39, 39, 42, 0.6);
            border-radius: 50%;
            border-top: 12px solid #6366f1;
            width: 120px;
            height: 120px;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        #loading p {
            font-size: 16px;
            color: #d4d4d8;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(17, 17, 27, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            color: #71717a;
        }

        .footer a {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #a5b4fc;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loading-icon"></div>
        <p>Analyzing ticket, please wait...</p>
    </div>
    <div id="summary" class="summary"></div>

    <script src="/libs/marked.min.js"></script>
    <script src="ticketSummary.js"></script>

    <div class="footer">
        <a href="https://github.com/El3ctr1cR" target="_blank">https://github.com/El3ctr1cR</a>
        <span id="versionText">Version </span>
    </div>
</body>

</html>
