<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Summary</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
    :root {
      --bw-blue: #175DDC; --bw-blue-light: #e8f0fd;
      --text: #1f2937; --text-sec: #6b7280; --text-muted: #9ca3af;
      --bg: #f9fafb; --bg-white: #ffffff;
      --border: #e5e7eb; --radius: 6px;
    }
    body.dark {
      --bw-blue: #4d8ef0; --bw-blue-light: #1e2d45;
      --text: #e5e7eb; --text-sec: #9ca3af; --text-muted: #6b7280;
      --bg: #111827; --bg-white: #1f2937; --border: #374151;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 14px; }
    .header { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 0 20px; height: 50px; display: flex; align-items: center; flex-shrink: 0; }
    .header-title { font-size: 15px; font-weight: 600; }
    .page-content { flex: 1; padding: 24px 20px; }
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; gap: 16px; color: var(--text-sec); font-size: 13px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--bw-blue); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #summary { display: none; max-width: 800px; }
    #summary h1, #summary h2, #summary h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-sec); margin: 18px 0 6px; }
    #summary p { font-size: 14px; line-height: 1.7; margin: 0 0 10px; color: var(--text); }
    #summary ul { padding-left: 20px; margin: 0 0 10px; }
    #summary li { font-size: 14px; line-height: 1.7; margin-bottom: 4px; }
    #summary strong { font-weight: 600; }
    .footer { flex-shrink: 0; display: flex; justify-content: space-between; padding: 10px 20px; background: var(--bg-white); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }
    .footer a { color: var(--bw-blue); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Ticket Summary</span>
  </div>
  <div class="page-content">
    <div id="loading">
      <div class="loading-spinner"></div>
      <p>Analyzing ticket, please wait...</p>
    </div>
    <div id="summary"></div>
  </div>
  <div class="footer">
    <a href="https://github.com/El3ctr1cR" target="_blank">https://github.com/El3ctr1cR</a>
    <span id="versionText">Version </span>
  </div>
  <script src="/libs/marked.min.js"></script>
  <script src="ticketSummary.js"></script>
</body>
</html>
